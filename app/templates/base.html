<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}API Checker{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', path='/favicon.svg') }}" type="image/svg+xml">
  {% block head %}{% endblock %}
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
  <script src="{{ url_for('static', path='/vendor/lucide.min.js') }}" defer></script>
  <script src="{{ url_for('static', path='/app.js') }}" defer></script>
</head>
<body>
  <aside class="sidebar">
    <a class="brand" href="/">
      <span class="brand-mark"><i data-lucide="activity"></i></span>
      <span>API Checker</span>
    </a>
    <nav>
      <a href="/" class="{{ 'active' if path == '/' else '' }}">
        <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
      </a>
      <a href="/accounts" class="{{ 'active' if path.startswith('/accounts') else '' }}">
        <i data-lucide="server-cog"></i><span>Providers</span>
      </a>
      <a href="/settings" class="{{ 'active' if path == '/settings' else '' }}">
        <i data-lucide="settings"></i><span>Settings</span>
      </a>
      <a href="/about" class="{{ 'active' if path == '/about' else '' }}">
        <i data-lucide="circle-help"></i><span>About</span>
      </a>
    </nav>
    <div class="sidebar-foot">
      <span class="live-dot"></span>
      <span>Server running</span>
    </div>
  </aside>
  <main>
    {% block content %}{% endblock %}
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div class="modal-backdrop" data-app-modal hidden>
    <section class="app-modal" role="dialog" aria-modal="true" aria-labelledby="app-modal-title">
      <div class="app-modal-heading">
        <span class="app-modal-icon" data-modal-icon><i data-lucide="info"></i></span>
        <div><h2 id="app-modal-title" data-modal-title>Provider information</h2><p data-modal-subtitle></p></div>
        <button class="icon-button" type="button" title="Close" data-modal-close><i data-lucide="x"></i></button>
      </div>
      <div class="app-modal-body" data-modal-body></div>
      <div class="app-modal-actions">
        <button class="button secondary" type="button" data-modal-cancel>Close</button>
        <button class="button danger" type="button" data-modal-confirm hidden>Confirm</button>
      </div>
    </section>
  </div>
</body>
</html>
